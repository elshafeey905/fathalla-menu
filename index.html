<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو فتح الله - Fathalla Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Libre+Barcode+39&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #d95c50; --secondary: #d5b895; --dark: #2c3e50; --light: #fcfaf5;
    --gold: #d4b86a; --green: #2e8b57;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background-color: var(--light); color: var(--dark); min-height: 100vh; overflow-x: hidden; transition: 0.3s; }
.menu-container { max-width: 1200px; margin: 0 auto; padding: 15px; }

/* Header & Icons */
.header { text-align: center; padding: 30px 10px; background: linear-gradient(135deg, var(--primary) 0%, #b33930 100%); border-radius: 20px; margin-bottom: 20px; position: relative; }
.top-actions { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; }
.icon-btn { background: rgba(255,255,255,0.2); border: none; width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; }

/* Kitchen Menu Title */
.kitchen-title { display: inline-flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; color: #fff; margin-top: 10px; letter-spacing: 1px; }
.chef-hat { width: 25px; height: 25px; fill: white; margin-right: 5px; }

/* Navigation */
.nav-tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.6); border-radius: 15px; }
.nav-tab { padding: 8px 15px; border: none; border-radius: 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: 0.3s; background: var(--dark); color: white; }
.nav-tab.active { background: var(--primary); }

/* Sections & Cards */
.section { display: none; }
.section.active { display: block; }
.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
.item-card { background: #fff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.item-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; }
.item-desc { font-size: 0.9rem; color: #666; margin-bottom: 8px; }
.item-price { font-size: 1.2rem; font-weight: 900; color: var(--primary); }

/* Footer & Social */
.footer { text-align: center; padding: 30px; margin-top: 40px; background: var(--dark); border-radius: 20px; color: #fff; }
.hotline-btn { font-size: 1.5rem; color: var(--gold); font-weight: 900; display: inline-block; padding: 10px; text-decoration: none; }
.social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
.social-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; }
.social-btn svg { width: 20px; height: 20px; fill: white; }
.fb-btn { background: #1877F2; } .ig-btn { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); } .tt-btn { background: #000; } .yt-btn { background: #FF0000; }

/* Dark Mode */
body.dark-mode { background-color: #1a1b20 !important; color: #e4e6eb !important; }
body.dark-mode .item-card { background: #24262d !important; }

.barcode-font { font-family: 'Libre Barcode 39', cursive; font-size: 35px; color: var(--dark); }
body.dark-mode .barcode-font { color: #fff; }
</style>
</head>
